<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #sidenav mode="side" [(opened)]="openedSidenav" class="history-drawer">
    <div class="drawer-header">
      <h5 class="mb-0">Search History</h5>
    </div>
    <ul class="list-group list-group-flush sidenav-list">
      <li
        class="list-group-item"
        *ngFor="let h of history"
        (click)="onCheckHistory(h.gutenberg_id); sidenav.close()"
      >
        {{ h.title }}
      </li>
    </ul>
  </mat-sidenav>

  <mat-sidenav-content>
    <section class="bg-circle-gradiant book-hero d-flex">
      <div class="bg-overlay bg-overlay-white"></div>
      <div class="container py-5">
        <div class="row justify-content-center">
          <div class="col-12 col-xl-11">
            <div class="card search-page shadow rounded border-0">
              <div class="card-body p-4 p-lg-5">
                <div class="header-container">
                  <button
                    type="button"
                    class="btn btn-light history-btn"
                    (click)="sidenav.toggle()"
                  >
                    History
                  </button>
                  <div class="title-block">
                    <h1 class="header-title mb-1">Project Gutenberg</h1>
                    <p class="text-muted mb-0">Search any Gutenberg book by ID and explore insights instantly.</p>
                  </div>
                </div>

                <div class="search-container mt-4">
                  <div class="input-group input-group-lg">
                    <input
                      type="number"
                      class="form-control"
                      placeholder="Enter Book ID (e.g. 84)"
                      aria-label="Book ID"
                      aria-describedby="search-book-btn"
                      min="1"
                      [(ngModel)]="inputGutenbergId"
                      (keydown)="$event.key == 'Enter' ? onSearchBook() : ''"
                    />
                    <button
                      id="search-book-btn"
                      class="btn btn-primary px-4"
                      type="button"
                      (click)="onSearchBook()"
                    >
                      Search
                    </button>
                  </div>
                </div>

                <div
                  *ngIf="isLoading"
                  class="w-100 d-flex justify-content-center align-items-center py-5"
                >
                  <div class="spinner-border text-primary" style="width: 3rem; height: 3rem" role="status"></div>
                </div>

                <div *ngIf="metadata != null" class="book-container mt-5">
                  <div class="row g-4 g-lg-5 align-items-start">
                    <div class="col-lg-4 col-xl-3">
                      <div class="book-img-actions d-flex flex-column align-items-center">
                        <div class="book-image mb-3">
                          <div
                            class="book-image-skeleton"
                            *ngIf="!isCoverImageLoaded"
                            aria-hidden="true"
                          ></div>
                          <img
                            [class.is-loaded]="isCoverImageLoaded"
                            [src]="
                              'https://www.gutenberg.org/cache/epub/' +
                              gutenbergId +
                              '/pg' +
                              gutenbergId +
                              '.cover.medium.jpg'
                            "
                            alt="Book Cover"
                            (load)="onCoverImageLoaded()"
                            (error)="onCoverImageError()"
                          />
                        </div>

                        <div class="book-buttons d-grid gap-2 w-100">
                          <button
                            class="btn btn-primary"
                            (click)="!isLoadingContent && onReadBook()"
                          >
                            <span
                              *ngIf="isLoadingContent"
                              class="spinner-border spinner-border-sm me-2"
                              role="status"
                              aria-hidden="true"
                            ></span>
                            Read the eBook
                          </button>
                          <button
                            class="btn btn-primary analyze-btn"
                            (click)="!isLoadingAnalysis && onAnalyzeBook()"
                          >
                            <span
                              *ngIf="isLoadingAnalysis"
                              class="spinner-border spinner-border-sm me-2"
                              role="status"
                              aria-hidden="true"
                            ></span>
                            Analyze
                          </button>
                        </div>
                      </div>
                    </div>

                    <div class="col-lg-8 col-xl-9">
                      <div class="book-details" #bookDetailsContainer>
                        <h2 class="book-title text-center text-lg-start mb-4">
                          {{ metadata.title }}
                        </h2>

                        <ng-container *ngIf="!showBookContent">
                          <app-book-analysis
                            *ngIf="!readBook && analysis != null"
                            [analysis]="analysis"
                          ></app-book-analysis>

                          <app-book-metadata
                            *ngIf="!readBook && metadata != null"
                            [metadata]="metadata"
                          ></app-book-metadata>
                        </ng-container>

                        <div *ngIf="content != null && showBookContent" class="book-content-scroll">
                          <app-book-content [content]="content"></app-book-content>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </mat-sidenav-content>
</mat-sidenav-container>
