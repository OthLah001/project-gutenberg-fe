<div class="auth-page">
  <header class="auth-header">
    <h1 class="auth-brand">Gutenberg Library</h1>
    <div class="auth-brand-icon" aria-hidden="true">
      <span class="material-symbols-outlined">auto_stories</span>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-blob auth-blob--top" aria-hidden="true"></div>
    <div class="auth-blob auth-blob--bottom" aria-hidden="true"></div>

    <div class="auth-card">
      <div class="auth-intro">
        <h2 class="auth-title">Begin Your Journey</h2>
        <p class="auth-subtitle">
          Create an account to save your favorite literary treasures and curated
          collections.
        </p>
      </div>

      @if (registraionError) {
        <div class="auth-alert" role="alert">
          <span class="material-symbols-outlined">error</span>
          <span>{{ errorMessage }}</span>
        </div>
      }

      <form class="auth-form" [formGroup]="signupForm" (ngSubmit)="onRegisterUser()">
        <div class="auth-name-row">
          <div class="auth-field">
            <label class="auth-label" for="first_name">First name</label>
            <div class="auth-input-wrap">
              <input
                id="first_name"
                type="text"
                class="auth-input"
                placeholder="Evelyn"
                formControlName="first_name"
                [class.is-invalid]="
                  controls['first_name'].touched && controls['first_name'].errors
                "
              />
              <span class="auth-input-icon material-symbols-outlined">person</span>
            </div>
          </div>

          <div class="auth-field">
            <label class="auth-label" for="last_name">Last name</label>
            <div class="auth-input-wrap">
              <input
                id="last_name"
                type="text"
                class="auth-input"
                placeholder="Thorne"
                formControlName="last_name"
                [class.is-invalid]="
                  controls['last_name'].touched && controls['last_name'].errors
                "
              />
              <span class="auth-input-icon material-symbols-outlined">person</span>
            </div>
          </div>
        </div>

        <div class="auth-field">
          <label class="auth-label" for="email">Email address</label>
          <div class="auth-input-wrap">
            <input
              id="email"
              type="email"
              class="auth-input"
              placeholder="evelyn@example.com"
              formControlName="email"
              [class.is-invalid]="
                controls['email'].touched && controls['email'].errors
              "
            />
            <span class="auth-input-icon material-symbols-outlined">mail</span>
          </div>
        </div>

        <div class="auth-field">
          <label class="auth-label" for="password">Password</label>
          <div class="auth-input-wrap">
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              class="auth-input"
              placeholder="••••••••"
              formControlName="password"
              [class.is-invalid]="
                controls['password'].touched && controls['password'].errors
              "
            />
            <button
              type="button"
              class="auth-input-icon auth-input-icon--toggle material-symbols-outlined"
              [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
              (click)="showPassword = !showPassword"
            >
              {{ showPassword ? 'visibility' : 'visibility_off' }}
            </button>
          </div>
        </div>

        <button class="auth-submit" type="submit" [disabled]="registring">
          @if (registring) {
            <span
              class="spinner-border spinner-border-sm"
              role="status"
              aria-hidden="true"
            ></span>
          } @else {
            Create Account
            <span class="material-symbols-outlined" style="font-size: 20px"
              >arrow_forward</span
            >
          }
        </button>
      </form>

      <p class="auth-footer-text">
        Already a member?
        <a routerLink="/auth/login" class="auth-footer-link">Log in to Library</a>
      </p>
    </div>
  </main>

  <footer class="auth-page-footer">
    <p>Est. 2026 — Curated Discovery</p>
  </footer>
</div>
